server:
  port: 7176

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/flight_track?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456        # ← 改成你的 MySQL 密码
  sql:
    init:
      mode: always          # 每次启动都执行 data.sql（可改为 never 关闭）
      data-locations: classpath:data.sql
  jpa:
    hibernate:
      ddl-auto: update      # 首次启动自动建表，之后只做增量变更
    defer-datasource-initialization: true   # 确保 JPA 建表后再执行 data.sql
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

# 跨域：允许前端 localhost:7175 访问
cors:
  allowed-origins: http://localhost:7175
